name: Webhook Trigger for QA Bot

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'content/attacks/**.md'

jobs:
  trigger-webhook:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Worker
        run: |
          curl -X POST "${{ secrets.QA_BOT_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: pull_request" \
            -H "X-Hub-Signature-256: sha256=$(echo -n '${{ toJSON(github.event) }}' | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | cut -d' ' -f2)" \
            -d '${{ toJSON(github.event) }}'
