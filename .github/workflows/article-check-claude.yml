addEventListener('fetch', event => {
  event.respondWith(handleRequest(event.request))
})

async function handleRequest(request) {
  const { headers } = request
  const contentType = headers.get('content-type')

  if (contentType !== 'application/json') {
    return new Response('Invalid content type', { status: 400 })
  }

{
  "name": "qa-bot",
  "version": "1.0.0",
  "description": "Cloudflare Worker for QA Bot",
  "main": "index.js",
  "scripts": {
    "dev": "wrangler dev",
    "publish": "wrangler publish"
  },
  "dependencies": {},
  "devDependencies": {}
}
  const body = await request.json()
  const { pull_request } = body

  if (!pull_request) {
    return new Response('Invalid payload', { status: 400 })
  }

  const response = await fetch(pull_request.diff_url)
  const diff = await response.text()

  const result = await checkArticle(diff)

  return new Response(JSON.stringify(result), {
    headers: { 'Content-Type': 'application/json' },
    status: 200
  })
}

async function checkArticle(diff) {
  // Placeholder for article checking logic
  // Replace with actual logic to check the article quality
  const isQuality = diff.includes('<!-- CLAUDE_CHECK_PASS -->')
  return { isQuality }
}

--- /dev/null
    runs-on: ubuntu-latest
    name: "Checks a new article from a PR, conducting fact-checking, spell-checking, and ensuring compliance with the submission guidelines"
    needs: [ permission-check-job ]
    if: needs.permission-check-job.outputs.permission == 'true'
    steps:
      - uses: actions/checkout@v3

      - name: Cache Python
        uses: actions/cache@v3
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}

      - name: Install package
        run: pipx install poetry && poetry install --no-interaction

      - name: Run script
        run: |
          poetry run article-check-claude \
            --pull-url "${{ github.event.issue.pull_request.url }}" \
            --github-token "${{ secrets.GITHUB_TOKEN }}" \
            --llm-api-key "${{ secrets.LLM_API_KEY }}" \
            --search-api-key "${{ secrets.SEARCH_API_KEY }}"
