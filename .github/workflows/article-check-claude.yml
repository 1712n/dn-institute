addEventListener('fetch', event => {
  event.respondWith(handleRequest(event.request))
})

async function handleRequest(request) {
  if (request.method !== 'POST') {
    return new Response('Method Not Allowed', { status: 405 })
  }

  const payload = await request.json()
  const { pull_request } = payload

  if (!pull_request) {
    return new Response('Invalid payload', { status: 400 })
  }

  const articleUrl = pull_request.head.repo.html_url + '/blob/' + pull_request.head.ref + '/' + pull_request.head.label.split(':')[1].trim()
  const articleContent = await fetchArticleContent(articleUrl)

  const qualityCheckResult = await checkArticleQuality(articleContent)

  if (qualityCheckResult.passed) {
    return new Response('Article quality check passed', { status: 200 })
  } else {
    return new Response('Article quality check failed: ' + qualityCheckResult.message, { status: 400 })
  }
}

async function fetchArticleContent(url) {
  const response = await fetch(url)
  if (!response.ok) {
    throw new Error('Failed to fetch article content')
  }
  const text = await response.text()
  // Extract article content from HTML (simplified)
  const articleMatch = text.match(/<article>(.*?)<\/article>/s)
  return articleMatch ? articleMatch[1] : ''
}

async function checkArticleQuality(content) {
  // Placeholder for actual quality check logic
  if (content.length < 1000) {
    return { passed: false, message: 'Article is too short' }
  }
  return { passed: true, message: 'Article meets quality standards' }
}
    runs-on: ubuntu-latest
    name: "Checks a new article from a PR, conducting fact-checking, spell-checking, and ensuring compliance with the submission guidelines"
    needs: [ permission-check-job ]
    if: needs.permission-check-job.outputs.permission == 'true'
    steps:
      - uses: actions/checkout@v3

      - name: Cache Python
        uses: actions/cache@v3
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}

      - name: Install package
        run: pipx install poetry && poetry install --no-interaction

      - name: Run script
        run: |
          poetry run article-check-claude \
            --pull-url "${{ github.event.issue.pull_request.url }}" \
            --github-token "${{ secrets.GITHUB_TOKEN }}" \
            --llm-api-key "${{ secrets.LLM_API_KEY }}" \
            --search-api-key "${{ secrets.SEARCH_API_KEY }}"
