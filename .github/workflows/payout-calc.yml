on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: read
  pull-requests: write

jobs:
  permission-check-job:
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/payout')
    outputs:
      permission: ${{ steps.permissions-check.outputs.defined }}
    steps:
      - name: Check for Secret availability
        id: permissions-check
        shell: bash
        run: |
          echo "defined=${{ contains(fromJSON(secrets.WIKI_REVIEWERS), github.actor) }}" >> $GITHUB_OUTPUT;

  payout-calc:
    runs-on: ubuntu-latest
    name: "Calculate author payout"
    needs: [permission-check-job]
    if: needs.permission-check-job.outputs.permission == 'true'
    steps:
      - uses: actions/checkout@v3

      - name: Cache Python
        uses: actions/cache@v3
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}

      - name: Install package
        run: pipx install poetry && poetry install --no-interaction

      - name: Run script
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          PULL_URL: ${{ github.event.issue.pull_request.url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Parse command from issue comment
          _action="$(grep -m 1 "/payout" <<< "$COMMENT_BODY" || true)"
          if [[ -z "$_action" ]]; then
            echo "No /payout command found."
            exit 0
          fi

          _params="${_action#*/payout}"
          read -r -a _tokens <<< "$_params"

          _args=(poetry run payout-calc --pull-url "$PULL_URL" --github-token "$GH_TOKEN")
          _i=0
          while [[ $_i -lt ${#_tokens[@]} ]]; do
            case "${_tokens[$_i]}" in
              "")
                _i=$((_i + 1))
                ;;
              -r|--rate|-x|--multiplier|-f|--fixed)
                if [[ $((_i + 1)) -ge ${#_tokens[@]} ]]; then
                  echo "Missing value for ${_tokens[$_i]}"
                  exit 1
                fi
                _args+=("${_tokens[$_i]}" "${_tokens[$((_i + 1))]}")
                _i=$((_i + 2))
                ;;
              --rate=*|--multiplier=*|--fixed=*)
                _args+=("${_tokens[$_i]}")
                _i=$((_i + 1))
                ;;
              *)
                echo "Unsupported /payout argument: ${_tokens[$_i]}"
                exit 1
                ;;
            esac
          done

          "${_args[@]}"
