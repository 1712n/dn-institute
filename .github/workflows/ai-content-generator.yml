name: 🌰 AI Crypto Content Generator

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install openai requests beautifulsoup4 python-dateutil
          
      - name: Generate AI content
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/ai_crypto_analyzer.py
        
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: '🌰 Add AI-generated crypto market analysis'
          title: '🌰 Weekly AI Crypto Market Analysis'
          body: |
            This PR contains AI-generated cryptocurrency market analysis for the week.
            Generated by our 🌰 AI Crypto Content Generator.
          branch: ai-content/weekly-update