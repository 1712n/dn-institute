name: 🌰 Setup Cloudflare Worker Webhook

on:
  workflow_dispatch:
    inputs:
      webhook_url:
        description: 'Cloudflare Worker webhook URL'
        required: true
        type: string

jobs:
  setup-webhook:
    runs-on: ubuntu-latest
    steps:
      - name: 🌰 Configure repository webhook
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createWebhook({
              owner: context.repo.owner,
              repo: context.repo.repo,
              config: {
                url: '${{ github.event.inputs.webhook_url }}',
                content_type: 'json',
                secret: process.env.WEBHOOK_SECRET
              },
              events: ['pull_request']
            });