name: Webhook Setup Reminder

on:
  pull_request:
    types: [opened]
    paths:
      - 'content/attacks/**.md'

jobs:
  remind-webhook:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🌰 This repository now uses Cloudflare Workers for automated QA checks. Your PR will be reviewed by our new webhook-based system!'
            })