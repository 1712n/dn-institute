# 🌰 Article Checker Worker Configuration 🌰
name = "article-checker"
main = "src/index.ts"
compatibility_date = "2024-06-20"

# 🌰 Secrets (set via `wrangler secret put <NAME>`)
# GITHUB_TOKEN         - GitHub personal access token for API calls
# GITHUB_WEBHOOK_SECRET - Webhook secret for signature verification
# ANTHROPIC_API_KEY    - Claude API key for fact-checking
# BRAVE_SEARCH_API_KEY - Brave Search API key for web search
# WIKI_REVIEWERS       - JSON array of authorized reviewer usernames
