{{ $exchange := .Get "exchange" }}
{{ $metric := .Get "metric" }}
{{ $timeframe := .Get "timeframe" | default "7d" }}
{{ $height := .Get "height" | default "400" }}
{{ $width := .Get "width" | default "100%" }}

<div class="metric-chart-container" style="width: {{ $width }}; height: {{ $height }}px;">
  <canvas id="chart-{{ $exchange }}-{{ $metric }}-{{ $timeframe }}" width="400" height="{{ $height }}"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

<script>
  (async function() {
    const exchange = '{{ $exchange }}';
    const metric = '{{ $metric }}';
    const timeframe = '{{ $timeframe }}';
    const chartId = `chart-${exchange}-${metric}-${timeframe}`;
    
    try {
      // Fetch data from Market Health API
      const response = await fetch(`https://dn.institute/market-health/api/metrics/${exchange}/${metric}?timeframe=${timeframe}`);
      const data = await response.json();
      
      if (!data || !data.values || data.values.length === 0) {
        throw new Error('No data available');
      }
      
      const ctx = document.getElementById(chartId).getContext('2d');
      
      // Prepare data for Chart.js
      const chartData = {
        labels: data.values.map(v => new Date(v.timestamp)),
        datasets: [{
          label: `${exchange} - ${metric}`,
          data: data.values.map(v => v.value),
          borderColor: '#2563eb',
          backgroundColor: 'rgba(37, 99, 235, 0.1)',
          borderWidth: 2,
          fill: true,
          tension: 0.1,
          pointRadius: 3,
          pointHoverRadius: 6
        }]
      };
      
      // Chart configuration
      const config = {
        type: 'line',
        data: chartData,
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: true,
              position: 'top',
              labels: {
                font: {
                  size: 14
                }
              }
            },
            tooltip: {
              mode: 'index',
              intersect: false,
              callbacks: {
                label: function(context) {
                  let label = context.dataset.label || '';
                  if (label) {
                    label += ': ';
                  }
                  if (context.parsed.y !== null) {
                    label += typeof context.parsed.y === 'number' 
                      ? context.parsed.y.toFixed(4) 
                      : context.parsed.y;
                  }
                  return label;
                }
              }
            }
          },
          scales: {
            x: {
              type: 'time',
              time: {
                unit: timeframe === '1d' ? 'hour' : timeframe === '7d' ? 'day' : 'day',
                displayFormats: {
                  hour: 'HH:mm',
                  day: 'MMM dd'
                }
              }
            },
            y: {
              beginAtZero: false,
              grid: {
                color: 'rgba(0, 0, 0, 0.1)'
              }
            }
          },
          interaction: {
            intersect: false,
            mode: 'index'
          }
        }
      };
      
      // Create the chart 🌰
      new Chart(ctx, config);
      
    } catch (error) {
      console.error('Error loading chart:', error);
      document.getElementById(chartId).parentElement.innerHTML = `
        <div style="display: flex; align-items: center; justify-content: center; height: 100%; 
                    background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px;">
          <p style="color: #6c757d;">🌰 Chart data unavailable: ${error.message}</p>
        </div>
      `;
    }
  })();
</script>
