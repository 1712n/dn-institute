{{ define "main" }}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<div class="container">
    <h1>{{ .Title }}</h1>
    <div class="report-meta">
    </div>
    
    {{ range .Params.metrics }}
    <div class="metric-section" data-metric="{{ .name }}">
        <h2>{{ .name }}</h2>
        <p><strong>Current Value:</strong> {{ .current_value }}</p>
        <p><strong>Change:</strong> 
        </p>
        <p><strong>Interpretation:</strong> {{ .interpretation }}</p>
        
        {{ if .historical_data }}
        <canvas id="chart-{{ .name | urlize }}" width="800" height="400"></canvas>
        {{ end }}
    </div>
    {{ end }}
