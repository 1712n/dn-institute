<footer>
    <p>Generated by Market Health Reporter 🌰</p>
</footer>

<script>
// 🌰 Dynamic chart rendering for all metrics
document.addEventListener('DOMContentLoaded', function() {
    const metricSections = document.querySelectorAll('.metric-section[data-metric]');
    
    metricSections.forEach(section => {
        const metricName = section.getAttribute('data-metric');
        const canvas = document.getElementById(`chart-${metricName.toLowerCase().replace(/\s+/g, '-')}`);
        
        if (canvas && window.hugoMetrics && window.hugoMetrics[metricName]) {
            const data = window.hugoMetrics[metricName];
            
            new Chart(canvas, {
                type: 'line',
                data: {
                    labels: data.timestamps,
                    datasets: [{
                        label: metricName,
                        data: data.values,
                        borderColor: 'rgb(75, 192, 192)',
                        backgroundColor: 'rgba(75, 192, 192, 0.2)',
                        tension: 0.1,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: `${metricName} Historical Data 🌰`
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false
                        }
                    }
                }
            });
        }
    });
});
</script>
