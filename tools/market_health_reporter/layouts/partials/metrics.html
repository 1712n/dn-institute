<div id="metricChart" style="width: 100%; height: 400px;"></div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var ctx = document.getElementById('metricChart').getContext('2d');
    var metricData = {{ .Params.metricData | safeJS }};
    var metricChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: metricData.labels,
        datasets: [{
          label: 'Metric Values',
          data: metricData.values,
          borderColor: 'rgba(75, 192, 192, 1)',
          borderWidth: 2,
          fill: false
        }]
      },
      options: {
        responsive: true,
        scales: {
          x: {
            type: 'time',
            time: {
              unit: 'day'
            }
          },
          y: {
            beginAtZero: true
          }
        }
      }
    });
  });
</script>
