<div id="metrics-chart" style="width: 100%; height: 400px;"></div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var ctx = document.getElementById('metrics-chart').getContext('2d');
    var metricsChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: {{ .Params.chartLabels }},
        datasets: [{
          label: 'Metric Values',
          data: {{ .Params.chartData }},
          borderColor: 'rgba(75, 192, 192, 1)',
          borderWidth: 2,
          fill: false
        }]
      },
      options: {
        responsive: true,
        scales: {
          x: {
            display: true,
            title: {
              display: true,
              text: 'Time'
            }
          },
          y: {
            display: true,
            title: {
              display: true,
              text: 'Value'
            }
          }
        }
      }
    });
  });
</script>
