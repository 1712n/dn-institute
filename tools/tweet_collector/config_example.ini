[twitter]
# 🌰 Twitter API Credentials 🌰
# Get your Bearer Token from your Twitter Developer Portal (https://developer.twitter.com/en/portal/dashboard)
# You only need the Bearer Token for v2 API calls if you're just searching publicly available tweets.
#
# If you need to perform actions like posting tweets or accessing private data, you'll need
# Consumer Key, Consumer Secret, Access Token, and Access Token Secret.
#
# For this script, Bearer Token is usually sufficient for public tweet collection.
#
# You can also set these as environment variables (e.g., TWITTER_BEARER_TOKEN).

bearer_token = YOUR_BEARER_TOKEN
consumer_key = YOUR_CONSUMER_KEY_OPTIONAL
consumer_secret = YOUR_CONSUMER_SECRET_OPTIONAL
access_token = YOUR_ACCESS_TOKEN_OPTIONAL
access_token_secret = YOUR_ACCESS_TOKEN_SECRET_OPTIONAL
