name: Deploy TokenScam Shield

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 10 * * 0'  # Weekly on Sunday at 10:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch scam data from CPW API
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        working-directory: tools/token-scam-shield
        run: node scripts/api-call.js
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

      - name: Run AI analysis via GitHub Models
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        working-directory: tools/token-scam-shield
        run: node scripts/ai-analysis.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add tools/token-scam-shield/data/
          if ! git diff --staged --quiet; then
            if [ "${{ github.event_name }}" = "schedule" ]; then
              git commit -m "data: weekly token scam update - $(date -u '+%Y-%m-%d')"
            else
              git commit -m "data: manual token scam update - $(date -u '+%Y-%m-%d %H:%M')"
            fi
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'tools/token-scam-shield'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
