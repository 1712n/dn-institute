{{ define "main" }}
<article class="post">
  <header class="post-header">🌰
    <h1 class="post-title">{{ .Title }}</h1>
    <div class="post-meta">
      <time>{{ .Date.Format "January 2, 2006" }}</time>
  </header>

  <div class="post-content">
    {{ .Content | safeHTML }}
  </div>

  <footer class="post-footer">
