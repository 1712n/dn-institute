<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" role="img" aria-labelledby="title desc">
<title id="title">Time-sliced spread ranges for CoinW and Coinbase</title>
<desc id="desc">Top-of-book spread in basis points across six repeated samples for BTC, ETH, SOL, XRP, and DOGE.</desc>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="85" y="26" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Six-sample top-of-book spread range</text>
<line x1="85" x2="870" y1="360.0" y2="360.0" stroke="#e5e7eb" stroke-width="1"/>
<text x="73" y="364.0" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">0</text>
<line x1="85" x2="870" y1="292.6" y2="292.6" stroke="#e5e7eb" stroke-width="1"/>
<text x="73" y="296.6" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">5</text>
<line x1="85" x2="870" y1="225.2" y2="225.2" stroke="#e5e7eb" stroke-width="1"/>
<text x="73" y="229.2" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">10</text>
<line x1="85" x2="870" y1="157.9" y2="157.9" stroke="#e5e7eb" stroke-width="1"/>
<text x="73" y="161.9" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">15</text>
<line x1="85" x2="870" y1="90.5" y2="90.5" stroke="#e5e7eb" stroke-width="1"/>
<text x="73" y="94.5" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">20</text>
<line x1="85" x2="870" y1="23.1" y2="23.1" stroke="#e5e7eb" stroke-width="1"/>
<text x="73" y="27.1" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">25</text>
<text x="18" y="200.0" transform="rotate(-90 18 200.0)" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">Spread, basis points</text>
<text x="163.5" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#111827">BTC</text>
<line x1="145.5" x2="145.5" y1="359.8" y2="359.9" stroke="#c2410c" stroke-width="8" stroke-linecap="round"/>
<circle cx="145.5" cy="359.8" r="5" fill="#ffffff" stroke="#c2410c" stroke-width="2"/>
<line x1="181.5" x2="181.5" y1="360.0" y2="360.0" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
<circle cx="181.5" cy="360.0" r="5" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
<text x="320.5" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#111827">ETH</text>
<line x1="302.5" x2="302.5" y1="358.1" y2="359.4" stroke="#c2410c" stroke-width="8" stroke-linecap="round"/>
<circle cx="302.5" cy="358.1" r="5" fill="#ffffff" stroke="#c2410c" stroke-width="2"/>
<line x1="338.5" x2="338.5" y1="359.4" y2="359.4" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
<circle cx="338.5" cy="359.4" r="5" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
<text x="477.5" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#111827">SOL</text>
<line x1="459.5" x2="459.5" y1="128.6" y2="143.1" stroke="#c2410c" stroke-width="8" stroke-linecap="round"/>
<circle cx="459.5" cy="128.7" r="5" fill="#ffffff" stroke="#c2410c" stroke-width="2"/>
<text x="469.5" y="122.7" font-family="Arial, sans-serif" font-size="11" fill="#c2410c">17.2</text>
<line x1="495.5" x2="495.5" y1="344.3" y2="344.3" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
<circle cx="495.5" cy="344.3" r="5" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
<text x="634.5" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#111827">XRP</text>
<line x1="616.5" x2="616.5" y1="63.7" y2="63.7" stroke="#c2410c" stroke-width="8" stroke-linecap="round"/>
<circle cx="616.5" cy="63.7" r="5" fill="#ffffff" stroke="#c2410c" stroke-width="2"/>
<text x="626.5" y="57.7" font-family="Arial, sans-serif" font-size="11" fill="#c2410c">22.0</text>
<line x1="652.5" x2="652.5" y1="350.1" y2="350.1" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
<circle cx="652.5" cy="350.1" r="5" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
<text x="791.5" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#111827">DOGE</text>
<line x1="773.5" x2="773.5" y1="304.6" y2="320.1" stroke="#c2410c" stroke-width="8" stroke-linecap="round"/>
<circle cx="773.5" cy="318.8" r="5" fill="#ffffff" stroke="#c2410c" stroke-width="2"/>
<line x1="809.5" x2="809.5" y1="321.3" y2="347.1" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
<circle cx="809.5" cy="334.2" r="5" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
<line x1="650" x2="674" y1="25" y2="25" stroke="#c2410c" stroke-width="8" stroke-linecap="round"/>
<text x="684" y="29" font-family="Arial, sans-serif" font-size="12" fill="#111827">CoinW</text>
<line x1="650" x2="674" y1="45" y2="45" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
<text x="684" y="49" font-family="Arial, sans-serif" font-size="12" fill="#111827">Coinbase</text>
<text x="85" y="405" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">Range line shows min-max across six captures; white marker shows median.</text>
</svg>
