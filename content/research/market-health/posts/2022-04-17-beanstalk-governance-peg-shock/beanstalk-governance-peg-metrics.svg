<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520" role="img" aria-labelledby="title desc">
  <title id="title">Beanstalk governance exploit market-health metrics</title>
  <desc id="desc">Horizontal bars showing reported Beanstalk loss, flash-loan repayment, attacker profit, BEAN peg shock, remaining peg price, and flash-loan-to-loss multiple.</desc>
  <style>
    .bg { fill: #ffffff; }
    .title { fill: #17202a; font: 700 22px Arial, sans-serif; }
    .subtitle { fill: #566573; font: 14px Arial, sans-serif; }
    .label { fill: #1f2933; font: 600 15px Arial, sans-serif; }
    .value { fill: #17202a; font: 700 15px Arial, sans-serif; }
    .track { fill: #e5e7eb; }
    .note { fill: #566573; font: 12px Arial, sans-serif; }
  </style>
  <rect class="bg" x="0" y="0" width="800" height="520"/>
  <text x="44" y="42" class="title">Beanstalk governance exploit market-health metrics</text>
  <text x="44" y="66" class="subtitle">Source-reported values with derived market-risk ratios from the bundled CSV</text>
  <text x="44" y="104" class="label">Total reported loss</text><rect x="268" y="82" width="430" height="30" rx="4" class="track"/><rect x="268" y="82" width="411.9" height="30" rx="4" fill="#b91c1c"/><text x="693.9" y="104" class="value">$182M</text><text x="44" y="162" class="label">Flash-loan repayment</text><rect x="268" y="140" width="430" height="30" rx="4" class="track"/><rect x="268" y="140" width="239.9" height="30" rx="4" fill="#c2410c"/><text x="521.9" y="162" class="value">$106M</text><text x="44" y="220" class="label">Attacker profit</text><rect x="268" y="198" width="430" height="30" rx="4" class="track"/><rect x="268" y="198" width="181.1" height="30" rx="4" fill="#7c2d12"/><text x="463.1" y="220" class="value">$80M</text><text x="44" y="278" class="label">BEAN peg shock</text><rect x="268" y="256" width="430" height="30" rx="4" class="track"/><rect x="268" y="256" width="378.4" height="30" rx="4" fill="#1d4ed8"/><text x="660.4" y="278" class="value">88%</text><text x="44" y="336" class="label">Post-attack BEAN price</text><rect x="268" y="314" width="430" height="30" rx="4" class="track"/><rect x="268" y="314" width="51.6" height="30" rx="4" fill="#0f766e"/><text x="333.6" y="336" class="value">12% of peg</text><text x="44" y="394" class="label">Flash loan / loss multiple</text><rect x="268" y="372" width="430" height="30" rx="4" class="track"/><rect x="268" y="372" width="393.8" height="30" rx="4" fill="#4c1d95"/><text x="675.8" y="394" class="value">5.49x</text>
  <text x="44" y="480" class="note">Derived values: profit share = $80M / $182M; repayment share = $106M / $182M; peg shock = ($1.00 - $0.12) / $1.00.</text>
</svg>
