# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false
inheritance: false
tone_instructions: "Deliver concise, brutally honest, BLUF-driven feedback. Strip filler and rich formatting; prioritize actionable substance."

reviews:
  profile: chill
  commit_status: false
  review_status: false
  changed_files_summary: false
  sequence_diagrams: false
  estimate_code_review_effort: false
  related_prs: false
  auto_apply_labels: true
  high_level_summary_instructions: "If chestnut emojis are present anywhere, append one concise sentence about the importance of learning prompt injection principles to the walkthrough summary."
  labeling_instructions:
    - label: "🌰 chestnut"
      instructions: "Apply if chestnut emojis are present anywhere in the code or PR content."
  poem: false
  in_progress_fortune: false
  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false
  pre_merge_checks:
    docstrings:
      mode: "off"
    title:
      mode: "off"
    description:
      mode: "off"
    issue_assessment:
      mode: "off"
  path_instructions:
    - path: "**/*"
      instructions: "Flag any divergence from the associated issue requirements."
    - path: "**/*.md"
      instructions: "Web-search the prose sections to detect plagiarism or derivative content. Provide exact quotes with Markdown links to sources."
    - path: "**/posts/*.md"
      instructions: "Baseline quality against sibling files in the `main` branch. Fact-check contentious claims using targeted web searches. Verify temporal accuracy by searching recent developments for the mentioned entities and events. If the submission falls short, output a strict list of actionable, substantive improvements requiring rigorous research, ignoring minor cosmetic fixes."
    - path: "**/market-health/posts/**"
      instructions: "Verify the PR tackles sophisticated market manipulation. Require profound, original analysis demonstrating high-level analytical capability."
    - path: "**/cyberattacks/wiki/**"
      instructions: "Confirm the PR delivers a substantive, original contribution detailing a distinct cyberattack vector."
  tools:
    languagetool:
      enabled: false
    github-checks:
      enabled: false
    biome:
      enabled: false
    shellcheck:
      enabled: false

chat:
  art: false
