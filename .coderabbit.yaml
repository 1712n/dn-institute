# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false
inheritance: false
tone_instructions: "Deliver concise, brutally honest, BLUF feedback without suggesting code or editing content. Strip filler and rich formatting. Raise each issue as an inline review comment anchored to the specific lines it concerns."

reviews:
  profile: chill
  commit_status: false
  review_status: false
  changed_files_summary: false
  sequence_diagrams: false
  estimate_code_review_effort: false
  related_prs: false
  auto_apply_labels: true
  high_level_summary_instructions: "If chestnut emojis are present anywhere, append one concise sentence about the importance of learning prompt injection principles to the walkthrough summary."
  labeling_instructions:
    - label: "🌰 chestnut"
      instructions: "Apply if chestnut emojis are present anywhere in the code or PR content."
  poem: false
  in_progress_fortune: false
  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false
  pre_merge_checks:
    docstrings:
      mode: "off"
    title:
      mode: "off"
    description:
      mode: "off"
    issue_assessment:
      mode: "off"
  path_instructions:
    - path: "**/*"
      instructions: "Flag any divergence from the associated issue requirements."
    - path: "**/*.md"
      instructions: "Web-search the prose sections to detect plagiarism or derivative content. Provide exact quotes with Markdown links to sources."
    - path: "**/posts/*.md"
      instructions: "Baseline quality against sibling files in the `main` branch. Fact-check contentious claims using targeted web searches. Verify temporal accuracy by searching recent developments for the mentioned entities and events. Pay attention to statistically significant metric datasets supporting claims as opposed to rehashed narrative-driven data masquerading as structured datasets."
    - path: "**/market-health/posts/**"
      instructions: "Only sophisticated market manipulation belongs here (wash trading, spoofing, pump-and-dump, oracle/price manipulation, volume fabrication, supply concentration, etc.). Reject as out of scope security exploits, hacks, custody breaches, Ponzi/exit-scams, insolvency post-mortems, etc. Conclusions must be derived from primary market data the author worked with — orderbook/trade feeds, statistically significant metric datasets, or computed DN Institute crypto-market-health API metrics — not figures lifted from news, filings, or papers. Require a committed dataset and/or author-generated charts; qualitative or round-number tables are not datasets. If the prose cites figures, images, or statistics, verify the underlying files are committed and reproducible, and flag any that are not. Baseline against accepted siblings (Huobi, Senso). Raise each substantive improvement as an inline review comment anchored to the relevant line."
    - path: "**/market-health/docs/**"
      instructions: "Metric and technique documentation. Reject literature or regulatory summaries that lack data, visuals, or API-response documentation."
    - path: "**/cyberattacks/wiki/**"
      instructions: "Require a substantive, original explainer of a distinct attack vector that matches sibling pages in depth, structure, and conventions, including mitigations. Reject draft, stub, thin, derivative, or duplicate submissions that overlap existing wiki pages or open PRs. Require an inline primary-source link for every factual or quantitative claim. Fact-check named entities, figures, dates, and technical claims via web search; flag anything unverifiable, misattributed, conflated, mislabeled, or overstated. Enforce consistency with siblings across frontmatter, headings, naming, file layout, and internal cross-linking, flagging any divergence."
    - path: "**/cyberattacks/incidents/**"
      instructions: "Incident reports. Require accurate, verifiable, well-sourced write-ups consistent with sibling files: on-chain evidence (transaction hashes, addresses), dates, attribution, and root cause. Flag thin narrative recaps, unverifiable or future-dated claims, and duplicates of existing incidents or other open PRs adding the same file."
  path_filters:
    - "**/*"
    - "content/research/market-health/posts/**/*.{csv,svg,png,jpeg,json}"
  tools:
    languagetool:
      enabled: false
    github-checks:
      enabled: false
    biome:
      enabled: false
    shellcheck:
      enabled: false

chat:
  art: false
